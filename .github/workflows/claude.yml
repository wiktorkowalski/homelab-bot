name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    uses: wiktorkowalski/github-workflows/.github/workflows/claude-code-review.yml@master
    with:
      runner-labels: '["self-hosted", "homelab-bot"]'
    secrets: inherit
